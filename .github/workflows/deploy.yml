name: Deploy to AWS EC2

on:
  push:
    branches:
      - dev
      - feat/aws-deployment

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. SSH into EC2 and deploy ───────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            set -e

            APP_DIR="/app/cems"

            echo "==> Pulling latest code from feat/aws-deployment branch..."
            cd $APP_DIR
            git fetch origin
            git reset --hard origin/feat/aws-deployment

            echo "==> Writing .env file from GitHub Secrets..."
            # Use echo statements (not heredoc) to avoid YAML indentation
            # adding leading spaces to every line in the .env file
            {
              echo "DATABASE_URL=${{ secrets.DATABASE_URL }}"
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"
              echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
              echo "JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}"
              echo "JWT_EXPIRATION=15m"
              echo "JWT_REFRESH_EXPIRATION=7d"
              echo "SMTP_HOST=${{ secrets.SMTP_HOST }}"
              echo "SMTP_PORT=${{ secrets.SMTP_PORT }}"
              echo "SMTP_USER=${{ secrets.SMTP_USER }}"
              echo "SMTP_PASS=${{ secrets.SMTP_PASS }}"
              echo "SMTP_FROM=${{ secrets.SMTP_FROM }}"
              echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}"
              echo "BACKEND_URL=${{ secrets.BACKEND_URL }}"
              echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}"
              echo "NODE_ENV=production"
              echo "PORT=4000"
              echo "REDIS_HOST=redis"
              echo "REDIS_PORT=6379"
            } > .env

            echo "==> Reclaiming disk space from logs, cache and apt..."
            sudo journalctl --vacuum-time=1s || true
            sudo find /var/log -type f -regex '.*\.gz\|.*\.1' -delete || true
            sudo apt-get autoremove -y || true
            sudo apt-get clean || true
            sudo rm -rf /tmp/* || true

            echo "==> Pruning Docker resources..."
            docker system prune -af --volumes
            docker builder prune -af

            echo "==> Configuring swap space (reusing if exists to prevent OOM / text busy errors)..."
            if [ -f /swapfile ]; then
              echo "Swap file already exists. Ensuring it is active..."
              sudo swapon /swapfile 2>/dev/null || true
            else
              echo "Swap file does not exist. Creating 1.5G swap space..."
              sudo fallocate -l 1.5G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi
            echo "Swap status: $(free -h | grep Swap)"

            echo "==> Host disk space usage before build:"
            df -h
            echo "==> Largest folders in /var/log:"
            sudo du -sh /var/log/* 2>/dev/null | sort -hr | head -n 5 || true
            echo "==> Largest folders in /var/lib/docker:"
            sudo du -sh /var/lib/docker/* 2>/dev/null | sort -hr | head -n 5 || true

            echo "==> Truncating container logs to reclaim space..."
            sudo sh -c 'truncate -s 0 /var/lib/docker/containers/*/*-json.log' 2>/dev/null || true

            echo "==> Building production container images..."
            DOCKER_BUILDKIT=1 docker compose -f docker-compose.prod.yml build

            echo "==> Starting database services only (postgres + redis)..."
            docker compose -f docker-compose.prod.yml up -d postgres redis

            echo "==> Waiting for postgres to be healthy..."
            until docker exec cems-postgres pg_isready -U cems -d cems_db; do
              echo "  postgres not ready yet, waiting..."
              sleep 3
            done
            echo "postgres is healthy!"

            echo "==> Running Prisma migrations via standalone one-shot container..."
            # Build a corrected DATABASE_URL using the postgres Docker service name
            # (replaces localhost/127.0.0.1 with the compose service hostname 'postgres')
            MIGRATION_DB_URL=$(grep '^DATABASE_URL=' $APP_DIR/.env | cut -d= -f2- | sed 's|localhost|postgres|g; s|127\.0\.0\.1|postgres|g')
            echo "Migration DB host: $(echo $MIGRATION_DB_URL | sed 's|:.*@|:***@|')"
            docker run --rm \
              --network cems_prod_network \
              -e DATABASE_URL="$MIGRATION_DB_URL" \
              cems-api \
              npx prisma migrate deploy

            echo "==> Migrations complete. Starting API container..."
            docker compose -f docker-compose.prod.yml up -d api

            echo "==> Waiting for API to stabilize (30s)..."
            sleep 30
            docker inspect --format='{{.State.Status}}' cems-api

            echo "==> Starting frontend and reverse proxy (web + nginx)..."
            docker compose -f docker-compose.prod.yml up -d web nginx

            echo "==> Deployment complete! Container status:"
            docker compose -f docker-compose.prod.yml ps

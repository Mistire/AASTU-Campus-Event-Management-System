name: Deploy to AWS EC2

on:
  push:
    branches:
      - dev
      - feat/aws-deployment

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. SSH into EC2 and deploy ───────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 18m
          script: |
            set -e

            APP_DIR="/app/cems"

            echo "==> Pulling latest code from feat/aws-deployment branch..."
            cd $APP_DIR
            git fetch origin
            git reset --hard origin/feat/aws-deployment

            echo "==> Writing .env file from GitHub Secrets..."
            cat > .env << 'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=15m
            JWT_REFRESH_EXPIRATION=7d
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            BACKEND_URL=${{ secrets.BACKEND_URL }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            ENVEOF

            echo "==> Reclaiming disk space from logs, cache and apt..."
            sudo journalctl --vacuum-time=1s || true
            sudo find /var/log -type f -regex '.*\.gz\|.*\.1' -delete || true
            sudo apt-get autoremove -y || true
            sudo apt-get clean || true
            sudo rm -rf /tmp/* || true

            echo "==> Pruning Docker resources..."
            docker system prune -af --volumes
            docker builder prune -af

            echo "==> Configuring swap space (reusing if exists to prevent OOM / text busy errors)..."
            if [ -f /swapfile ]; then
              echo "Swap file already exists. Ensuring it is active..."
              sudo swapon /swapfile 2>/dev/null || true
            else
              echo "Swap file does not exist. Creating 1.5G swap space..."
              sudo fallocate -l 1.5G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi
            echo "Swap status: $(free -h | grep Swap)"

            echo "==> Host disk space usage before build:"
            df -h
            echo "==> Largest folders in /var/log:"
            sudo du -sh /var/log/* 2>/dev/null | sort -hr | head -n 5 || true
            echo "==> Largest folders in /var/lib/docker:"
            sudo du -sh /var/lib/docker/* 2>/dev/null | sort -hr | head -n 5 || true

            echo "==> Truncating container logs to reclaim space..."
            sudo sh -c 'truncate -s 0 /var/lib/docker/containers/*/*-json.log' 2>/dev/null || true

            echo "==> Building and starting production containers..."
            DOCKER_BUILDKIT=1 docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d

            echo "==> Waiting for API container to be healthy..."
            sleep 10

            echo "==> Running Prisma migrations..."
            docker exec cems-api npx prisma migrate deploy

            echo "==> Deployment complete! Container status:"
            docker compose -f docker-compose.prod.yml ps

name: Deploy to AWS EC2

on:
  push:
    branches:
      - dev
      - feat/aws-deployment

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. SSH into EC2 and deploy ───────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 18m
          script: |
            set -e

            APP_DIR="/app/cems"

            echo "==> Pulling latest code from feat/aws-deployment branch..."
            cd $APP_DIR
            git fetch origin
            git reset --hard origin/feat/aws-deployment

            echo "==> Writing .env file from GitHub Secrets..."
            cat > .env << 'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION=15m
            JWT_REFRESH_EXPIRATION=7d
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            BACKEND_URL=${{ secrets.BACKEND_URL }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            ENVEOF

            echo "==> Cleaning system logs and temporary files..."
            sudo journalctl --vacuum-size=50M || true
            sudo apt-get clean || true

            echo "==> Pruning all unused Docker containers, images, volumes, and builder cache..."
            docker system prune -af --volumes
            docker builder prune -af

            echo "==> Ensuring swap space exists (prevents OOM during nest build on small EC2)..."
            if [ ! -f /swapfile ]; then
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
              echo "Swap created: $(free -h | grep Swap)"
            else
              sudo swapon /swapfile 2>/dev/null || true
              echo "Swap already exists: $(free -h | grep Swap)"
            fi

            echo "==> Truncating container logs to reclaim space..."
            sudo sh -c 'truncate -s 0 /var/lib/docker/containers/*/*-json.log' 2>/dev/null || true

            echo "==> Building and starting production containers..."
            DOCKER_BUILDKIT=1 docker compose -f docker-compose.prod.yml build
            docker compose -f docker-compose.prod.yml up -d

            echo "==> Waiting for API container to be healthy..."
            sleep 10

            echo "==> Running Prisma migrations..."
            docker exec cems-api npx prisma migrate deploy

            echo "==> Deployment complete! Container status:"
            docker compose -f docker-compose.prod.yml ps

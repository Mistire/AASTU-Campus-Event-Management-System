name: Deploy to AWS EC2

on:
  push:
    branches:
      - dev                  # triggers on merge to dev
      - feat/aws-deployment  # triggers on direct push (current demo branch)

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. SSH into EC2 and deploy ───────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          command_timeout: 18m
          script: |
            set -e

            APP_DIR="/app/cems"

            echo "==> Pulling latest code from ${{ github.ref_name }} branch..."
            cd $APP_DIR
            git fetch origin
            git checkout ${{ github.ref_name }} || git checkout -b ${{ github.ref_name }} origin/${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            echo "==> Writing .env file from GitHub Secrets..."
            cat > .env << 'ENVEOF'
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
            JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }}
            JWT_REFRESH_EXPIRATION=${{ secrets.JWT_REFRESH_EXPIRATION }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_PORT=${{ secrets.SMTP_PORT }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            SMTP_FROM=${{ secrets.SMTP_FROM }}
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            BACKEND_URL=${{ secrets.BACKEND_URL }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            EMAIL_VERIFICATION_TOKEN_TTL=${{ secrets.EMAIL_VERIFICATION_TOKEN_TTL }}
            RESET_TOKEN_TTL_MINUTES=${{ secrets.RESET_TOKEN_TTL_MINUTES }}
            SEED_SUPERUSER_EMAIL=${{ secrets.SEED_SUPERUSER_EMAIL }}
            SEED_SUPERUSER_PASSWORD=${{ secrets.SEED_SUPERUSER_PASSWORD }}
            SEED_SUPERUSER_FULL_NAME=${{ secrets.SEED_SUPERUSER_FULL_NAME }}
            NODE_ENV=production
            PORT=4000
            PRISMA_LOG_QUERIES=false
            REDIS_HOST=redis
            REDIS_PORT=6379
            ENVEOF

            echo "==> Pruning unused Docker resources to free disk space..."
            docker system prune -f --filter "until=48h"

            echo "==> Building and starting production containers..."
            docker compose -f docker-compose.prod.yml up --build -d

            echo "==> Waiting for API container to be healthy..."
            for i in {1..20}; do
              if docker inspect -f '{{.State.Status}}' cems-api | grep -q "running"; then
                echo "Container is running. Waiting for NestJS to bootstrap..."
                sleep 5
                break
              fi
              echo "Waiting... ($i/20)"
              sleep 2
            done

            echo "==> Running Prisma migrations..."
            if ! docker exec cems-api npx prisma migrate deploy; then
              echo "ERROR: Migration failed. Capture API logs:"
              docker logs cems-api --tail 100
              exit 1
            fi

            echo "==> Deployment complete! Container status:"
            docker compose -f docker-compose.prod.yml ps

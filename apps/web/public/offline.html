<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CEMS - Offline</title>
  <style>
    :root {
      --color-brand: #38bdf8;
      --color-brand-hover: #0284c7;
      --background: #0f172a;
      --foreground: #f8fafc;
      --card-bg: rgba(30, 41, 59, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background glow */
    body::before {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      top: 20%;
      left: 30%;
      z-index: 0;
    }

    body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(2, 132, 199, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
      bottom: 20%;
      right: 25%;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 480px;
      text-align: center;
      padding: 2.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 1.5rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3), 0 8px 10px -6px rgb(0 0 0 / 0.3);
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .logo-container {
      margin-bottom: 2rem;
      position: relative;
      display: inline-block;
    }

    .logo-pulse {
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      border: 2px solid var(--color-brand);
      border-radius: 50%;
      opacity: 0;
      animation: pulse 2.5s infinite;
    }

    .offline-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--color-brand) 0%, var(--color-brand-hover) 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      color: #ffffff;
      box-shadow: 0 10px 20px -5px rgba(56, 189, 248, 0.4);
    }

    .offline-icon svg {
      width: 40px;
      height: 40px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      letter-spacing: -0.025em;
    }

    p {
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2rem;
      font-size: 1rem;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background-color: var(--color-brand);
      color: #0f172a;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 1.75rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: all 0.2s ease;
      box-shadow: 0 4px 6px -1px rgba(56, 189, 248, 0.2), 0 2px 4px -1px rgba(56, 189, 248, 0.1);
    }

    .btn-retry:hover {
      background-color: #ffffff;
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(255, 255, 255, 0.1), 0 4px 6px -4px rgba(255, 255, 255, 0.1);
    }

    .btn-retry:active {
      transform: translateY(0);
    }

    .network-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      margin-bottom: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .network-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background-color: #ef4444;
      border-radius: 50%;
      display: inline-block;
      animation: blink 1.5s infinite;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        opacity: 0.5;
      }
      50% {
        opacity: 0;
      }
      100% {
        transform: scale(1.3);
        opacity: 0;
      }
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo-container">
      <div class="logo-pulse"></div>
      <div class="offline-icon">
        <!-- Cloud off icon -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 13.5h3.86a2.25 2.25 0 0 1 2.008 1.24l.885 1.77a2.25 2.25 0 0 0 2.007 1.24h1.98a2.25 2.25 0 0 0 2.007-1.24l.885-1.77a2.25 2.25 0 0 1 2.007-1.24h3.86m-18 0h18" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1.5m0 9v.008H12V13.5M2.25 12h1.5m16.5 0h1.5m-3.97-6.03 1.06 1.06M6.47 17.53l1.06 1.06M17.53 17.53l-1.06-1.06M6.47 6.47l-1.06 1.06" />
        </svg>
      </div>
    </div>

    <div>
      <span class="network-badge">Connection Lost</span>
    </div>
    
    <h1>No Connection Available</h1>
    <p>You are currently offline. Check your Wi-Fi or cellular settings and we'll automatically reconnect you once you're back.</p>
    
    <button class="btn-retry" onclick="checkConnection()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
      </svg>
      Try Reconnecting
    </button>
  </div>

  <script>
    function checkConnection() {
      const btn = document.querySelector('.btn-retry');
      btn.style.opacity = '0.7';
      btn.innerHTML = 'Checking...';
      
      // Attempt a lightweight fetch to check internet
      fetch('/')
        .then(() => {
          window.location.reload();
        })
        .catch(() => {
          setTimeout(() => {
            btn.style.opacity = '1';
            btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg> Try Reconnecting`;
          }, 800);
        });
    }

    // Auto-reload when going back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
